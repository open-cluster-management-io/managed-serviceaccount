# Image of the managed service-account instances
image: quay.io/open-cluster-management/managed-serviceaccount
tag:
agentInstallAll: true

# Target managed cluster for rendering a ManagedClusterAddOn directly.
# Leave empty to rely on the ClusterManagementAddOn install strategy.
targetCluster: ""

# Number of replicas
replicas: 1

featureGates:
  ephemeralIdentity: false
  clusterProfile: false

agentImagePullSecret: ""

prometheus:
  enabled: false
  serviceMonitor:
    labels: {}
