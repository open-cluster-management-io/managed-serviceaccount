{{- if eq .Values.installMode "Hosted" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: managed-serviceaccount-kubeconfig-provisioner-source
  namespace: {{ include "managed-serviceaccount-agent.externalManagedKubeConfigNamespace" . }}
  annotations:
    addon.open-cluster-management.io/hosted-manifest-location: hosting
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["{{ .Values.ExternalManagedKubeConfigSecret }}"]
  verbs: ["get"]
{{- end }}
