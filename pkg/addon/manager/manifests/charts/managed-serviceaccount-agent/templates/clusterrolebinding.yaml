kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: open-cluster-management:managed-serviceaccount:addon-agent
{{- if eq .Values.installMode "Hosted" }}
  annotations:
    addon.open-cluster-management.io/hosted-manifest-location: managed
{{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: open-cluster-management:managed-serviceaccount:addon-agent
subjects:
  - kind: ServiceAccount
    name: {{ .Values.ManagedServiceAccountName }}
    namespace: {{ .Values.addonInstallNamespace }}
